<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cumpleaños Angel Acosta León 2026</title>

    <!-- WhatsApp / OG Tags -->
    <meta property="og:title" content="Estás invitado al Cumpleaños de Angel Acosta León">
    <meta property="og:description" content="Domingo 26 de Abril, 2:30 PM - Jardín Hacienda Tezontle. ¡Te esperamos!">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=1200&h=630&fit=crop">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #C9A84C;
            --gold-light: #E8D48B;
            --gold-dark: #A07D2E;
            --cream: #FDF8F0;
            --dark: #1A1A1A;
            --dark-soft: #2D2D2D;
            --text-light: #F5F0E8;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--dark);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Background pattern */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(201, 168, 76, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(201, 168, 76, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(201, 168, 76, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            animation: floatUp 6s infinite;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.6; }
            90% { opacity: 0.3; }
            100% { opacity: 0; transform: translateY(-10vh) scale(1); }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        /* Header ornament */
        .ornament {
            text-align: center;
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeInDown 1s 0.3s forwards;
        }

        .ornament svg {
            width: 60px;
            height: 30px;
            fill: var(--gold);
        }

        /* Top line accent */
        .top-accent {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, transparent, var(--gold), transparent);
            margin: 0 auto 20px;
            opacity: 0;
            animation: fadeIn 1s 0.2s forwards;
        }

        /* Invitation card */
        .card {
            background: linear-gradient(145deg, rgba(30,30,30,0.95), rgba(20,20,20,0.98));
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 20px;
            padding: 40px 28px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 25px 60px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(201, 168, 76, 0.1);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        /* Corner decorations */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: var(--gold);
            opacity: 0.4;
        }

        .corner-tl { top: 12px; left: 12px; border-top: 1px solid; border-left: 1px solid; border-radius: 4px 0 0 0; }
        .corner-tr { top: 12px; right: 12px; border-top: 1px solid; border-right: 1px solid; border-radius: 0 4px 0 0; }
        .corner-bl { bottom: 12px; left: 12px; border-bottom: 1px solid; border-left: 1px solid; border-radius: 0 0 0 4px; }
        .corner-br { bottom: 12px; right: 12px; border-bottom: 1px solid; border-right: 1px solid; border-radius: 0 0 4px 0; }

        /* Text styles */
        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 11px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--gold);
            text-align: center;
            margin-bottom: 6px;
            opacity: 0;
            animation: fadeInDown 0.8s 0.5s forwards;
        }

        .subtitle-2 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-style: italic;
            font-size: 16px;
            color: var(--gold-light);
            text-align: center;
            margin-bottom: 4px;
            opacity: 0;
            animation: fadeInDown 0.8s 0.7s forwards;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 28px;
            text-align: center;
            color: var(--text-light);
            margin-bottom: 20px;
            line-height: 1.1;
            opacity: 0;
            animation: fadeInUp 0.8s 0.9s forwards;
        }

        .main-title span {
            display: block;
            background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Photo */
        .photo-section {
            text-align: center;
            margin: 8px 0 0;
            opacity: 0;
            animation: scaleIn 1s 0.95s forwards;
        }

        .photo-frame {
            position: relative;
            display: inline-block;
            padding: 4px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
            box-shadow: 0 8px 32px rgba(201, 168, 76, 0.25);
        }

        .photo-frame img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center 15%;
            display: block;
            border: 3px solid var(--dark);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 24px 0;
            opacity: 0;
            animation: fadeIn 0.8s 1s forwards;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .divider-diamond {
            width: 8px;
            height: 8px;
            background: var(--gold);
            transform: rotate(45deg);
        }

        /* Name section */
        .name-section {
            text-align: center;
            margin: 24px 0;
            opacity: 0;
            animation: scaleIn 1s 1.1s forwards;
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 700;
            font-style: italic;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, #DFC06F 60%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            text-shadow: none;
            filter: drop-shadow(0 2px 4px rgba(201, 168, 76, 0.2));
        }

        .year {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 18px;
            letter-spacing: 12px;
            color: var(--gold);
            margin-top: 4px;
        }

        /* Date section */
        .date-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin: 28px 0;
            opacity: 0;
            animation: fadeInUp 0.8s 1.3s forwards;
        }

        .date-side {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold-light);
            padding: 0 16px;
        }

        .date-number {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            font-weight: 900;
            color: var(--gold);
            line-height: 1;
            padding: 0 16px;
            border-left: 1px solid rgba(201, 168, 76, 0.3);
            border-right: 1px solid rgba(201, 168, 76, 0.3);
        }

        .date-month {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold-light);
        }

        /* Time */
        .time-section {
            text-align: center;
            margin: 16px 0 28px;
            opacity: 0;
            animation: fadeInUp 0.8s 1.5s forwards;
        }

        .time {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-light);
            letter-spacing: 2px;
        }

        .time-label {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            margin-top: 4px;
        }

        /* Location */
        .location-section {
            text-align: center;
            margin: 20px 0;
            opacity: 0;
            animation: fadeInUp 0.8s 1.7s forwards;
        }

        .location-icon {
            width: 24px;
            height: 24px;
            fill: var(--gold);
            margin-bottom: 8px;
        }

        .location-name {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        .location-address {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            font-weight: 300;
            color: rgba(245, 240, 232, 0.7);
            line-height: 1.5;
            max-width: 320px;
            margin: 0 auto;
        }

        /* Map section */
        .map-section {
            margin: 30px -28px -40px;
            opacity: 0;
            animation: fadeInUp 0.8s 1.9s forwards;
        }

        .map-container {
            position: relative;
            border-top: 1px solid rgba(201, 168, 76, 0.2);
            overflow: hidden;
            border-radius: 0 0 20px 20px;
        }

        .map-container iframe {
            width: 100%;
            height: 250px;
            border: none;
            filter: grayscale(0.3) contrast(1.1);
        }

        .map-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(to bottom, rgba(20,20,20,0.8), transparent);
            pointer-events: none;
        }

        /* CTA Button */
        .cta-section {
            padding: 24px 28px 0;
            opacity: 0;
            animation: fadeInUp 0.8s 2.1s forwards;
        }

        .cta-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            color: var(--dark);
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(201, 168, 76, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(201, 168, 76, 0.4);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        .cta-button svg {
            width: 18px;
            height: 18px;
            fill: var(--dark);
        }


        /* Footer */
        .footer {
            text-align: center;
            margin-top: 32px;
            opacity: 0;
            animation: fadeIn 0.8s 2.5s forwards;
        }

        .footer p {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 15px;
            color: rgba(201, 168, 76, 0.6);
        }

        .footer .emoji {
            font-size: 20px;
            margin-top: 8px;
            display: block;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Shimmer effect on name */
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .name {
            background-size: 200% auto;
            animation: shimmer 4s linear infinite;
        }

        /* Responsive */
        @media (max-width: 380px) {
            .card {
                padding: 32px 20px;
            }
            .name {
                font-size: 42px;
            }
            .date-number {
                font-size: 52px;
            }
            .map-section {
                margin: 30px -20px -32px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>

    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <div class="container">

        <!-- Top accent line -->
        <div class="top-accent"></div>

        <!-- Ornament -->
        <div class="ornament">
            <svg viewBox="0 0 100 40">
                <path d="M50 5 L55 15 L65 15 L57 22 L60 32 L50 26 L40 32 L43 22 L35 15 L45 15 Z" opacity="0.6"/>
                <path d="M15 18 Q30 8 50 18 Q70 8 85 18" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>
                <path d="M20 24 Q35 14 50 24 Q65 14 80 24" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
            </svg>
        </div>

        <!-- Invitation Card -->
        <div class="card">
            <!-- Corners -->
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>

            <!-- Header text -->
            <p class="subtitle">Estás cordialmente</p>
            <p class="subtitle-2">invitado a mi</p>
            <h1 class="main-title"><span>Cumpleaños</span></h1>

            <!-- Photo -->
            <div class="photo-section">
                <div class="photo-frame">
                    <img src="angel.png" alt="Angel Acosta León">
                </div>
            </div>

            <!-- Divider -->
            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-diamond"></div>
                <div class="divider-line"></div>
            </div>

            <!-- Name -->
            <div class="name-section">
                <h2 class="name">Angel Acosta León</h2>
                <p class="year">2 0 2 6</p>
            </div>

            <!-- Date -->
            <div class="date-section">
                <div>
                    <p class="date-side">Domingo</p>
                </div>
                <div class="date-number">26</div>
                <div>
                    <p class="date-month">Abril</p>
                </div>
            </div>

            <!-- Time -->
            <div class="time-section">
                <p class="time">02:30 PM</p>
                <p class="time-label">Hora de inicio</p>
            </div>

            <!-- Divider -->
            <div class="divider" style="animation-delay: 1.6s;">
                <div class="divider-line"></div>
                <div class="divider-diamond"></div>
                <div class="divider-line"></div>
            </div>

            <!-- Location -->
            <div class="location-section">
                <svg class="location-icon" viewBox="0 0 24 24">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
                <p class="location-name">Jardín Hacienda Tezontle</p>
                <p class="location-address">Portal de las Flores Mz 13 Lote 14,<br>Col. Área Federal Central de Abastos</p>
            </div>

            <!-- Map -->
            <div class="map-section">
                <div class="map-container">
                    <iframe
                        src="https://www.google.com/maps?q=Jardin+Hacienda+Tezontle,+Portal+de+Las+Flores+no.+14,+CEDA,+Iztapalapa,+09040+Ciudad+de+México,+CDMX&output=embed"
                        allowfullscreen=""
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                    <div class="map-overlay"></div>
                </div>
            </div>
        </div>

        <!-- CTA: Open in Google Maps -->
        <div class="cta-section">
            <a href="https://maps.app.goo.gl/ti4ChPmrzmGvgJkS6?g_st=iw" target="_blank" class="cta-button">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
                Cómo Llegar
            </a>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>¡ Te esperamos !</p>
            <span class="emoji">🎂</span>
        </div>

    </div>

    <script>
        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        const particleCount = 25;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = (4 + Math.random() * 4) + 's';
            particle.style.width = (2 + Math.random() * 4) + 'px';
            particle.style.height = particle.style.width;
            particlesContainer.appendChild(particle);
        }

        // Resolve Google Maps short URL to get proper embed
        // Using the direct short link as the CTA button instead
        // The embedded map uses approximate coordinates for the Central de Abastos area
    </script>

</body>
</html>
